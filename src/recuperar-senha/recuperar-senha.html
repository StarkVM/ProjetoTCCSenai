<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recuperar Senha - TCC Máquinas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<link rel="stylesheet" href="../generico/cssgenerico/style.css">
<link rel="stylesheet" href="recuperar.css">
</head>

<body>

<div id="header"></div>

<main>

<div id="controller">

<div id="main">

<h2 class="titulo-recuperar">
<span class="material-symbols-outlined">lock_reset</span>
Recuperar senha
</h2>

<p class="descricao">
Digite seu e-mail cadastrado para receber o link de redefinição de senha.
</p>

<form id="form-recuperar">

<div class="mb-3">

<label>Email</label>

<input 
type="email"
class="form-control"
id="email"
placeholder="Digite seu e-mail"
required
>

</div>

<button 
type="submit"
class="btn w-100"
id="submitbutton"
>

Enviar link de recuperação

</button>

</form>

<p id="mensagem"></p>

<button 
class="btn-login"
onclick="window.location.href='../login/login.html'"
>

Voltar para login

</button>

</div>

</div>

</main>

<div id="footer"></div>

<script src="../generico/jsgenerico/frame.js"></script>
<script src="recuperar.js"></script>

</body>
</html>
