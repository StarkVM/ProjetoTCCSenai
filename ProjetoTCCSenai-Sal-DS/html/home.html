<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Home - TCC Máquinas</title>
  <link rel="stylesheet" href="../css/home.css">
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="home-page">

<div id="header"></div>

<main class="container">

<div id="carouselExample" class="carousel slide container mt-4" data-bs-ride="carousel">
  
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
  </div>

  <div class="carousel-inner rounded shadow">

    <div class="carousel-item active">
      <img src="../img/banner1.jpg" class="d-block w-100" style="height: 400px; object-fit: cover;">
      <div class="carousel-caption d-none d-md-block">
        <h5>Alugue Máquinas com Facilidade</h5>
        <p>Os melhores equipamentos para sua obra.</p>
      </div>
    </div>

    <div class="carousel-item">
      <img src="../img/banner2.jpg" class="d-block w-100" style="height: 400px; object-fit: cover;">
      <div class="carousel-caption d-none d-md-block">
        <h5>Equipamentos Modernos</h5>
        <p>Qualidade e segurança garantidas.</p>
      </div>
    </div>

    <div class="carousel-item">
      <img src="../img/banner3.jpg" class="d-block w-100" style="height: 400px; object-fit: cover;">
      <div class="carousel-caption d-none d-md-block">
        <h5>Entrega Rápida</h5>
        <p>Atendemos toda a região.</p>
      </div>
    </div>

  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>

  <section class="products">
    <h2>Anúncios recentes</h2>
    <div class="product-grid" id="productGrid"></div>
  </section>

</main>

<div id="controller"></div>
<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/home.js"></script>
<script src="../js/frame.js"></script>

</body>
</html>
